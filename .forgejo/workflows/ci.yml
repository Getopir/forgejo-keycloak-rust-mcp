name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    if: ${{ forgejo.server_url != 'https://codeberg.org' }}
    runs-on: docker
    container:
      image: rust:1.95
    steps:
      - name: Install checkout runtime
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git nodejs openssl
          echo | openssl s_client -showcerts -connect forgejo.lan:443 -servername forgejo.lan 2>/dev/null > /tmp/forgejo-chain.pem
          awk '/BEGIN CERTIFICATE/{n++} n==2{print} n==2 && /END CERTIFICATE/{exit}' /tmp/forgejo-chain.pem > /usr/local/share/ca-certificates/forgejo-intermediate-ca.crt
          test "$(openssl x509 -in /usr/local/share/ca-certificates/forgejo-intermediate-ca.crt -noout -fingerprint -sha256)" = "sha256 Fingerprint=3B:59:BD:00:12:79:D0:4D:A5:A0:B5:A4:75:87:1A:6A:47:70:09:C5:E7:78:6C:C4:AD:11:DC:4F:0B:10:E8:3C"
          update-ca-certificates
          rustup component add rustfmt clippy
          rm -f /tmp/forgejo-chain.pem
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Install security tools
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny
          cargo install --locked cargo-cyclonedx
      - name: Audit dependencies
        run: cargo audit
      - name: Enforce dependency policy
        run: cargo deny check
      - name: Generate SBOM
        run: cargo cyclonedx --format json
  public:
    if: ${{ forgejo.server_url == 'https://codeberg.org' }}
    runs-on: codeberg-medium
    container:
      image: rust:1.95
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
