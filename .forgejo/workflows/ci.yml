name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: docker
    container:
      image: rust:1.95
    steps:
      - name: Install checkout runtime
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git nodejs
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Install security tools
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny
          cargo install --locked cargo-cyclonedx
      - name: Audit dependencies
        run: cargo audit
      - name: Enforce dependency policy
        run: cargo deny check
      - name: Generate SBOM
        run: cargo cyclonedx --format json --output-file target/forgejo-keycloak-rust-mcp.cdx.json
