name: release-sbom

on:
  release:
    types: [published]

jobs:
  attach:
    if: ${{ forgejo.server_url != 'https://codeberg.org' }}
    runs-on: docker
    env:
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/forgejo-intermediate-ca.crt
    container:
      image: rust:1.95
    steps:
      - name: Install release tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git jq nodejs openssl
          echo | openssl s_client -showcerts -connect forgejo.lan:443 -servername forgejo.lan 2>/dev/null > /tmp/forgejo-chain.pem
          awk '/BEGIN CERTIFICATE/{n++} n==2{print} n==2 && /END CERTIFICATE/{exit}' /tmp/forgejo-chain.pem > /usr/local/share/ca-certificates/forgejo-intermediate-ca.crt
          test "$(openssl x509 -in /usr/local/share/ca-certificates/forgejo-intermediate-ca.crt -noout -fingerprint -sha256)" = "sha256 Fingerprint=3B:59:BD:00:12:79:D0:4D:A5:A0:B5:A4:75:87:1A:6A:47:70:09:C5:E7:78:6C:C4:AD:11:DC:4F:0B:10:E8:3C"
          update-ca-certificates
          rm -f /tmp/forgejo-chain.pem
          rm -rf /var/lib/apt/lists/*
          cargo install --locked cargo-cyclonedx
      - uses: actions/checkout@v4
        with:
          ref: ${{ forgejo.event.release.tag_name }}
      - name: Generate CycloneDX SBOMs
        run: cargo cyclonedx --format json
      - name: Attach SBOMs to the hosted release
        env:
          FORGEJO_API_URL: ${{ forgejo.api_url }}
          FORGEJO_REPOSITORY: ${{ forgejo.repository }}
          FORGEJO_RELEASE_TAG: ${{ forgejo.event.release.tag_name }}
          FORGEJO_TOKEN: ${{ forgejo.token }}
        run: |
          set -eu
          release_id="$(curl --fail --silent --show-error \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${FORGEJO_API_URL}/repos/${FORGEJO_REPOSITORY}/releases/tags/${FORGEJO_RELEASE_TAG}" \
            | jq -r '.id')"
          test -n "${release_id}"
          find crates -name '*.cdx.json' -type f -print | while read -r sbom; do
            name="$(basename "${sbom}")"
            curl --fail --silent --show-error \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -F "attachment=@${sbom};filename=${name};type=application/vnd.cyclonedx+json" \
              "${FORGEJO_API_URL}/repos/${FORGEJO_REPOSITORY}/releases/${release_id}/assets?name=${name}"
          done
