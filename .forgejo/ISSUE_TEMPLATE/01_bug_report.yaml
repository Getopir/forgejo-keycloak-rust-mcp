name: Bug report
about: Report a reproducible problem in the gateway, CLI, docs, or packaging.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include live tokens, private keys, client secrets, or production credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: The gateway rejects a valid mapped principal when...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "1.0.2 or git commit SHA"
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the shortest safe reproduction you can.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted logs
      description: Paste only redacted logs. Remove bearer tokens, Forgejo tokens, Keycloak secrets, host credentials, and private URLs if needed.
      render: shell
    validations:
      required: false
