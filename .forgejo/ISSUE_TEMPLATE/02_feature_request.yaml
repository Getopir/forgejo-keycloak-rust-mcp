name: New feature
about: Propose a new MCP tool, policy control, deployment option, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this for new capabilities. For security-sensitive changes, describe the risk boundary without sharing secrets.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What user, operator, or agent workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MCP tool
        - Identity and Keycloak
        - Forgejo authorization
        - Approval gates
        - Packaging and install
        - Documentation
        - Security hardening
        - Other
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility notes
      description: Note any scopes, approvals, Forgejo permissions, output limits, or migration concerns.
    validations:
      required: false
