name: Question
about: Ask about installation, configuration, agent usage, or project direction.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Ask questions here. Do not include live bearer tokens, Forgejo tokens, Keycloak client secrets, or private keys.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to understand or confirm?
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Install
        - Configuration
        - Keycloak identity
        - Forgejo permissions
        - Agent MCP usage
        - Releases and crates.io
        - Roadmap
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant non-secret context, links, or redacted output.
    validations:
      required: false
