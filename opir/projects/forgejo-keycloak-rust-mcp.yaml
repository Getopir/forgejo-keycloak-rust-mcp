outcomes:
  - code: FKRM-L001
    title: Clean-room foundation and identity chain
    done:
      - Rust workspace builds and tests
      - Keycloak protected-resource metadata is served
      - Missing and wrong-audience tokens are rejected
      - Policy registry denies missing scopes
      - VM166 clone runs the daemon from Forgejo origin/main
  - code: FKRM-L002
    title: Forgejo delegation and principal mapping
    done:
      - Immutable Keycloak subject maps to Forgejo user ID/login
      - Trusted-header backend is isolated from public ingress
      - Sudo/PAT fallback is disabled unless explicitly configured
      - VM166 Keycloak token authenticates neutrino1-agent and is denied without forgejo:repo:read
  - code: FKRM-L003
    title: Curated MCP and CLI surface
    done:
      - Repository, file, issue, PR, review, Actions, release, and notification tools exist
      - Large responses are bounded and cursor based
      - CLI and MCP call the same operation registry
  - code: FKRM-L004
    title: Generated Forgejo API coverage
    done:
      - Pinned Forgejo specs are normalized
      - Every endpoint has classification and output budget
      - Build fails on unclassified endpoint
  - code: FKRM-L005
    title: Lab VM and Neutrino verification
    done:
      - Existing Keycloak issues human and agent tokens
      - VM166 runs the gateway from Forgejo origin/main
      - VM166 Keycloak token authenticates neutrino1-agent through the gateway
      - Current VM166 proof reaches authenticated gateway denial; granting forgejo:repo:read is still required for allowed Forgejo access
    blockers:
      - Blank Forgejo lab VM is not installed; VMID 103 is still a stopped template with Debian netinst ISO attached
      - Rawholding org repository creation requires a Forgejo token with write:organization or admin/web UI creation
      - VM166 Keycloak token currently has email/profile scopes only, not forgejo:repo:read
