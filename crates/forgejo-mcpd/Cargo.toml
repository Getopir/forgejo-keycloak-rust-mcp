axum.workspace = true
clap.workspace = true
identity = { package = "forgejo-keycloak-mcp-identity", path = "../identity", version = "1.1.2" }
policy = { package = "forgejo-keycloak-mcp-policy", path = "../policy", version = "1.1.2" }
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

[lints]
workspace = true
