[package]
name = "forgejo-keycloak-rust-mcp"
version = "1.1.2"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Clean-room Rust MCP gateway for Forgejo with Keycloak identity and Forgejo ACL enforcement."
